<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-base-url" content="{{ api_base_url }}">
  <title>TransferFlow Send Money</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script>window.API_BASE_URL = "{{ api_base_url }}";</script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="3"></rect>
            <path d="M3 10h18"></path>
            <path d="M8 14h5"></path>
          </svg>
        </div>
        <span>TransferFlow</span>
      </div>

      <nav class="side-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11h7V3H3zM14 21h7v-7h-7zM14 10h7V3h-7zM3 21h7v-7H3z"></path></svg>
          <span>Dashboard</span>
        </a>
        <a href="{{ url_for('send_money') }}" class="nav-item active">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4z"></path></svg>
          <span>Send Money</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span>Customers</span>
        </a>
        <a href="{{ url_for('messages') }}" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>Messages</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>
          <span>Reports</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7H4"></path><path d="M20 12H4"></path><path d="M20 17H4"></path></svg>
          <span>Balance</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 19V5"></path><path d="M10 19V9"></path><path d="M14 19V7"></path><path d="M18 19V11"></path></svg>
          <span>Loans</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2.7" y="5" width="18.6" height="14" rx="2.3"></rect><path d="M2.7 10.5h18.6"></path><path d="M7 15.2h4.5"></path></svg>
          <span>Commissions</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14.5a3.5 3.5 0 0 1 0 7H7"></path></svg>
          <span>Expenses</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 8 4.5v11L12 22l-8-4.5v-11z"></path><path d="m12 12 8-4.5"></path><path d="m12 12-8-4.5"></path><path d="M12 22V12"></path></svg>
          <span>Assets</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          <span>Audit Logs</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg>
          <span>Users</span>
        </a>
        <a href="{{ url_for('settings') }}" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15A1.65 1.65 0 0 0 20 16.82l.1.1a2 2 0 1 1-2.83 2.83l-.1-.1A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 1 1-4 0v-.2a1.65 1.65 0 0 0-.33-1 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.6l-.1.1a2 2 0 1 1-2.83-2.83l.1-.1A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 1 1 0-4h.2a1.65 1.65 0 0 0 1-.33 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.6-1.82l-.1-.1a2 2 0 1 1 2.83-2.83l.1.1A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 1 1 4 0v.2a1.65 1.65 0 0 0 .33 1 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.6l.1-.1a2 2 0 1 1 2.83 2.83l-.1.1A1.65 1.65 0 0 0 19.4 9c.27.32.47.7.6 1.1H21a2 2 0 1 1 0 4h-.2a1.65 1.65 0 0 0-1 .33z"></path></svg>
          <span>Settings</span>
        </a>
      </nav>
      <button class="collapse-btn" aria-label="Collapse sidebar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
      </button>
    </aside>

    <main class="content send-content">
      <section class="page-wrap send-page container-fluid px-3 px-md-4">
        <div class="send-hero">
          <div class="send-hero-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4z"></path></svg>
          </div>
          <div>
            <h2>Send Money</h2>
            <p>Initiate a mobile money transfer to any recipient</p>
          </div>
        </div>

        <article class="send-card">
          <div class="send-card-head">
            <div class="send-card-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4z"></path></svg>
            </div>
            <div>
              <h3>New Transfer</h3>
              <p>Send money to any mobile number in Tanzania</p>
            </div>
          </div>

          <form id="send-money-form" class="send-form" action="#" method="post" data-ajax-post="{{ url_for('api_send_money') }}" novalidate>
            <label class="send-field">
              <span>Sender Mobile Number</span>
              <div class="send-input-wrap select-wrap">
                <select class="send-input send-select" name="sender_mobile_number" aria-label="Sender mobile number" required>
                  <option value="">Select sender number</option>
                  {% for sender in sender_numbers %}
                  <option value="{{ sender }}">{{ sender }}</option>
                  {% endfor %}
                </select>
              </div>
            </label>

            <label class="send-field">
              <span>Receiver Phone Number</span>
              <div class="send-input-wrap">
                <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M22 16.9v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.1A19.5 19.5 0 0 1 5.2 12.8 19.8 19.8 0 0 1 2.1 4.4 2 2 0 0 1 4.1 2.2h3a2 2 0 0 1 2 1.7 12.8 12.8 0 0 0 .7 2.8 2 2 0 0 1-.45 2.1L8.1 10a16 16 0 0 0 5.9 5.9l1.2-1.2a2 2 0 0 1 2.1-.45 12.8 12.8 0 0 0 2.8.7 2 2 0 0 1 1.7 2z"></path>
                </svg>
                <input class="send-input with-leading-icon" type="tel" name="receiver_phone_number" placeholder="0754 123 456 or +255 754 123 456" required>
              </div>
            </label>

            <label class="send-field amount-field">
              <span>Amount (TZS)</span>
              <div class="send-input-wrap amount-wrap">
                <strong>TZS</strong>
                <input class="send-input amount-input" type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required>
              </div>
            </label>

            <button class="send-submit" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4z"></path></svg>
              Send Transfer
            </button>
            <p class="form-feedback" aria-live="polite"></p>
          </form>
        </article>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='ux-enhancements.js') }}"></script>
</body>
</html>
