<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-base-url" content="{{ api_base_url }}">
  <title>{% block document_title %}TransferFlow{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% block page_styles %}{% endblock %}
  <script>window.API_BASE_URL = "{{ api_base_url }}";</script>
</head>
<body>
  <div class="app-shell">
    {% include "partials/app_sidebar.html" %}

    <main class="{{ main_content_classes|default('content') }}">
      {% if show_topbar|default(true) %}
      <header class="topbar">
        <h1>{{ page_title|default("TransferFlow") }}</h1>
        <div class="profile">{{ profile_initial|default("L") }}</div>
      </header>
      {% endif %}

      {% block page_content %}{% endblock %}
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='ux-enhancements.js') }}"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
